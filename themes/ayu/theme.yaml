name: "Ayu"
family: ayu
source: "https://github.com/ayu-theme/ayu-colors"
description: "A simple, bright and elegant theme with three variants."

variants:
  - id: dark
    name: "Dark"
    style: dark
    colors:
      base: "#0b0e14"
      text: "#bfbdb6"
      black: "#0b0e14"
      red: "#f07178"
      green: "#aad94c"
      yellow: "#ffb454"
      blue: "#59c2ff"
      magenta: "#d2a6ff"
      cyan: "#39bae6"
      white: "#bfbdb6"
  - id: mirage
    name: "Mirage"
    style: dark
    colors:
      base: "#1f2430"
      text: "#cccac2"
      black: "#1f2430"
      red: "#ed8274"
      green: "#87d96c"
      yellow: "#ffd173"
      blue: "#73d0ff"
      magenta: "#dfbfff"
      cyan: "#5ccfe6"
      white: "#cccac2"
  - id: light
    name: "Light"
    style: light
    colors:
      base: "#fcfcfc"
      text: "#5c6166"
      black: "#fcfcfc"
      red: "#f07171"
      green: "#86b300"
      yellow: "#f2ae49"
      blue: "#399ee6"
      magenta: "#a37acc"
      cyan: "#55b4d4"
      white: "#5c6166"
