name: "Tokyo Night"
family: tokyo-night
source: "https://github.com/enkia/tokyo-night-vscode-theme"
description: "A clean, dark theme that celebrates the lights of downtown Tokyo at night."

variants:
  - id: night
    name: "Night"
    style: dark
    colors:
      base: "#1a1b26"
      text: "#c0caf5"
      black: "#15161e"
      red: "#f7768e"
      green: "#9ece6a"
      yellow: "#e0af68"
      blue: "#7aa2f7"
      magenta: "#bb9af7"
      cyan: "#7dcfff"
      white: "#a9b1d6"
  - id: storm
    name: "Storm"
    style: dark
    colors:
      base: "#24283b"
      text: "#c0caf5"
      black: "#1d202f"
      red: "#f7768e"
      green: "#9ece6a"
      yellow: "#e0af68"
      blue: "#7aa2f7"
      magenta: "#bb9af7"
      cyan: "#7dcfff"
      white: "#a9b1d6"
  - id: day
    name: "Day"
    style: light
    colors:
      base: "#e1e2e7"
      text: "#3760bf"
      black: "#e9e9ed"
      red: "#f52a65"
      green: "#587539"
      yellow: "#8c6c3e"
      blue: "#2e7de9"
      magenta: "#9854f1"
      cyan: "#007197"
      white: "#3760bf"
