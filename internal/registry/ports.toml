# lumos port base.
#
# Seeded from the canonical port lists published by the upstream theme
# projects:
#   catppuccin  https://github.com/catppuccin/catppuccin (resources/ports.yml)
#   dracula     https://github.com/dracula
#   base16      https://github.com/tinted-theming (base16 templates)
#   base24      https://github.com/tinted-theming (base24 templates)
#   rose-pine   https://github.com/rose-pine
#
# Each entry records where the program conventionally expects its theme
# file. `target` understands the lumos placeholders ${XDG_CONFIG_HOME},
# ${XDG_DATA_HOME}, $HOME, ~ plus ${slug} (the theme's slug) and ${name}
# (the theme's display name). A theme may override any target.

[ports.alacritty]
name = "Alacritty"
categories = ["terminal"]
target = "${XDG_CONFIG_HOME}/alacritty/themes/${slug}.toml"
families = ["catppuccin", "dracula", "base16", "base24", "rose-pine"]

[ports.kitty]
name = "kitty"
categories = ["terminal"]
target = "${XDG_CONFIG_HOME}/kitty/themes/${slug}.conf"
families = ["catppuccin", "dracula", "base16", "base24", "rose-pine"]

